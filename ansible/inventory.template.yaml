
# ssh "root@$(terraform -chdir=terraform output -raw k8s_node_01_ip)"

control_nodes:
  hosts:
    k8s-node-01:
      ansible_host: ${k8s_node_01.ipv4_address}
      ansible_ssh_extra_args: '-o StrictHostKeyChecking=no'
      ansible_python_interpreter: /usr/bin/python3.10

worker_nodes:
  hosts:
    k8s-node-02:
      ansible_host: ${k8s_node_02.ipv4_address}
      ansible_ssh_extra_args: '-o StrictHostKeyChecking=no'
      ansible_python_interpreter: /usr/bin/python3.10
    k8s-node-03:
      ansible_host: ${k8s_node_03.ipv4_address}
      ansible_ssh_extra_args: '-o StrictHostKeyChecking=no'
      ansible_python_interpreter: /usr/bin/python3.10

